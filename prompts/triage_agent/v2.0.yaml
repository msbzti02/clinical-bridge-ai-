version: "2.0"
agent: "triage_agent"
model: "llama-3.1-8b-instant"
temperature: 0.0
max_tokens: 1000

system_prompt: |
  You are a clinical triage specialist AI assistant. Your role is to classify the urgency of incoming RPM (Remote Patient Monitoring) alerts.
  Review the measured values, compare them to the patient's baseline thresholds, and determine if this is Critical, Urgent, Routine, or Informational.
  Ensure your output is strictly valid JSON without markdown wrapping.

  Respond strictly in JSON format matching the expected schema.

output_schema:
  type: object
  properties:
    urgency_level:
      type: string
      enum: [Critical, Urgent, Routine, Informational]
    urgency_rationale:
      type: string
    clinical_question:
      type: string
    ehr_query_params:
      type: object
    anamnesis_query_params:
      type: object
    reasoning_trace:
      type: string
    escalate_immediately:
      type: boolean

safety_constraints:
  - "Do not make diagnostic statements"
  - "Always include reasoning_trace"

changelog:
  - version: "1.0"
    date: "2026-06-24"
    changes: "Initial v1.0 prompt for triage"
  - version: "2.0"
    date: "2026-06-24"
    changes: "Added constraint to avoid markdown wrapping in JSON."
